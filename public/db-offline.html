<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tijdelijke storing</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5efe7;
      --card: #fffaf4;
      --text: #2f241d;
      --muted: #6c5a4f;
      --border: #dcc9b8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.75), transparent 40%),
        linear-gradient(180deg, var(--bg), #efe3d6);
      color: var(--text);
    }

    main {
      width: min(100%, 640px);
      padding: 40px 32px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--card);
      box-shadow: 0 18px 60px rgba(67, 46, 33, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.1;
    }

    p {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.6;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <h1>Tijdelijke technische problemen</h1>
    <p>We hebben momenteel technische problemen. Probeer het later nog eens. We proberen automatisch opnieuw te verbinden.</p>
  </main>
  <script>
    window.setTimeout(() => {
      window.location.reload();
    }, 30000);
  </script>
</body>
</html>
